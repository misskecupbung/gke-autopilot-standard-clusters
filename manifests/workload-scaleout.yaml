apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-scaleout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-scaleout
  template:
    metadata:
      labels:
        app: workload-scaleout
      annotations:
        # scale-out compute class uses Spot VMs
        # Good for batch or fault-tolerant workloads
        cloud.google.com/compute-class: "scale-out"
    spec:
      # Allow the pod to be evicted if the Spot node is reclaimed
      terminationGracePeriodSeconds: 30
      containers:
      - name: app
        image: nginx:stable
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
